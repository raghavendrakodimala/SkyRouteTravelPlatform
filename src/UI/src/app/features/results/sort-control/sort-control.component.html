<div class="sort-control" role="radiogroup" aria-label="Sort flight results">
  @for (option of options; track option; let i = $index) {
    <button
      type="button"
      class="sort-option"
      role="radio"
      [class.active]="active() === option"
      [attr.aria-checked]="active() === option"
      [attr.tabindex]="active() === option ? 0 : -1"
      (click)="select(option)"
      (keydown)="onKeydown($event, i)"
    >
      {{ labels[option] }}
    </button>
  }
</div>
